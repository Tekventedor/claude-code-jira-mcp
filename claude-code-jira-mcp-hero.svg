<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bgg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EEF4FF"/>
    </linearGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0084FF"/>
      <stop offset="1" stop-color="#1A56DB"/>
    </linearGradient>
    <linearGradient id="fhmark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0084FF"/>
      <stop offset="1" stop-color="#1A56DB"/>
    </linearGradient>
    <style>
      .t { font-family: Inter, system-ui, sans-serif; fill: #111928; }
      .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgg)"/>

  <!-- Soft brand glow -->
  <ellipse cx="1500" cy="240" rx="520" ry="280" fill="#0084FF" opacity="0.07"/>
  <ellipse cx="420" cy="860" rx="500" ry="260" fill="#1A56DB" opacity="0.06"/>

  <!-- Eyebrow -->
  <text x="160" y="200" class="t" font-size="22" font-weight="700" letter-spacing="3" fill="#6B7280">FLOWHUNT · CLAUDE CODE GUIDES</text>

  <!-- Headline -->
  <text x="160" y="320" class="t" font-size="104" font-weight="800" letter-spacing="-2">How to use</text>
  <text x="160" y="440" class="t" font-size="104" font-weight="800" letter-spacing="-2">
    <tspan fill="#0F172A">Claude Code with the </tspan><tspan fill="url(#grad)">Jira MCP</tspan>
  </text>

  <!-- Subtitle -->
  <text x="160" y="520" class="t" font-size="30" font-weight="500" fill="#374151">Pull real Jira issues. Run JQL searches. File the summary as a new Jira issue.</text>
  <text x="160" y="562" class="t" font-size="30" font-weight="500" fill="#374151">From your terminal, in one prompt.</text>

  <!-- Terminal preview card (centred, wider since we dropped the right-hand tiles) -->
  <g transform="translate(360, 640)">
    <rect width="1200" height="320" rx="14" fill="#0F172A" stroke="#111928"/>
    <circle cx="26" cy="28" r="7" fill="#FF5F57"/>
    <circle cx="48" cy="28" r="7" fill="#FEBC2E"/>
    <circle cx="70" cy="28" r="7" fill="#28C840"/>
    <text x="100" y="34" class="mono" font-size="14" fill="#94A3B8">claude  ·  atlassian MCP</text>

    <g transform="translate(28, 80)" class="mono" font-size="17">
      <text y="0" fill="#22C55E">&gt; <tspan fill="#E2E8F0">Capture this sprint as a Jira tracking issue.</tspan></text>
      <text y="36" fill="#94A3B8">⏺ <tspan fill="#0084FF" font-weight="700">atlassian</tspan>(<tspan fill="#FBBF24">getVisibleJiraProjects</tspan>)</text>
      <text y="60" fill="#94A3B8">  ⎿  <tspan fill="#E2E8F0">3 projects · picked </tspan><tspan fill="#22D3EE">KAN</tspan></text>
      <text y="96" fill="#94A3B8">⏺ <tspan fill="#0084FF" font-weight="700">atlassian</tspan>(<tspan fill="#FBBF24">searchJiraIssuesUsingJql</tspan>)</text>
      <text y="120" fill="#94A3B8">  ⎿  <tspan fill="#E2E8F0">16 issues resolved in 14d · grouped by 4 assignees</tspan></text>
      <text y="156" fill="#94A3B8">⏺ <tspan fill="#0084FF" font-weight="700">atlassian</tspan>(<tspan fill="#FBBF24">createJiraIssue</tspan>)</text>
      <text y="180" fill="#22C55E">  ⎿  ✓ KAN-145 created · Sprint summary 2026-05-14</text>
      <text y="220" fill="#94A3B8">     <tspan fill="#22D3EE" text-decoration="underline">flowhunt.atlassian.net/browse/KAN-145</tspan></text>
    </g>
  </g>

  <!-- Watermark -->
  <g transform="translate(960, 1030)" text-anchor="middle">
    <text class="t" font-size="22" font-weight="700">
      <tspan fill="#111928">Flow</tspan><tspan fill="url(#fhmark)">Hunt</tspan>
    </text>
    <text y="22" class="t" font-size="12" fill="#9CA3AF">flowhunt.io/blog</text>
  </g>
</svg>
